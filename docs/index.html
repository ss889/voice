<!DOCTYPE html>
<html lang="en">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            color: #1a1a1a;
            min-height: 100vh;
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .navbar .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .status-badge.connected::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-badge.disconnected::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 2px solid #e5e7eb;
            overflow-x: auto;
            padding-bottom: 0;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .tab-btn:hover {
            color: #667eea;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .tab-content h2 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #1a1a1a;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
            box-shadow: none;
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid;
        }
        
        .alert.success {
            background: #ecfdf5;
            color: #065f46;
            border-color: #10b981;
        }
        
        .alert.error {
            background: #fef2f2;
            color: #7f1d1d;
            border-color: #ef4444;
        }
        
        .alert.info {
            background: #eff6ff;
            color: #1e40af;
            border-color: #3b82f6;
        }
        
        .results {
            max-height: 600px;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .result-item {
            background: #f9fafb;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .result-item:hover {
            background: #f3f4f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .result-score {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .result-source {
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .result-text {
            color: #4b5563;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .result-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #9ca3af;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📚 Document Intelligence</h1>
        <div class="status-badge connected" id="statusBadge">✓ Connected</div>
    </div>
    
    <div class="container">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('upload')">📤 Upload</button>
            <button class="tab-btn" onclick="switchTab('search')">🔍 Search</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 Stats</button>
        </div>
        
        <!-- Upload Tab -->
        <div id="upload" class="tab-content active">
            <h2>Upload Document</h2>
            <div class="form-group">
                <label>Select a PDF or TXT file</label>
                <input type="file" id="file" accept=".pdf,.txt">
            </div>
            <button class="btn" onclick="uploadFile()">Upload & Ingest</button>
            <div id="uploadStatus"></div>
        </div>
        
        <!-- Search Tab -->
        <div id="search" class="tab-content">
            <h2>Search Documents</h2>
            <div class="form-group">
                <label>Ask a question about your documents</label>
                <textarea id="query" placeholder="What would you like to know?"></textarea>
            </div>
            <button class="btn" onclick="searchDocuments()">Search</button>
            <div id="searchStatus"></div>
            <div id="searchResults"></div>
        </div>
        
        <!-- Stats Tab -->
        <div id="stats" class="tab-content">
            <h2>Collection Statistics</h2>
            <button class="btn" onclick="fetchStats()">Refresh Stats</button>
            <div id="statsDisplay"></div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = localStorage.getItem('apiUrl') || 'https://voice-pba7.onrender.com';
        
        window.addEventListener('load', () => {
            checkApiStatus();
            setInterval(checkApiStatus, 30000);
        });
        
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`, { headers: { 'Accept': 'application/json' } });
                updateApiStatus(response.ok);
            } catch (e) {
                updateApiStatus(false);
            }
        }
        
        function updateApiStatus(connected) {
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
            badge.textContent = connected ? '✓ Connected' : '✗ Disconnected';
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function uploadFile() {
            const file = document.getElementById('file').files[0];
            if (!file) {
                showAlert('uploadStatus', 'Please select a file', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                showAlert('uploadStatus', '<span class="loading"></span> Uploading...', 'info');
                const response = await fetch(`${API_BASE_URL}/ingest`, { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('uploadStatus', `✓ Success! Ingested ${data.chunks_indexed} chunks from ${data.source}`, 'success');
                    document.getElementById('file').value = '';
                } else {
                    showAlert('uploadStatus', `Error: ${data.detail || 'Upload failed'}`, 'error');
                }
            } catch (error) {
                showAlert('uploadStatus', `Error: ${error.message}`, 'error');
            }
        }
        
        async function searchDocuments() {
            const query = document.getElementById('query').value;
            if (!query.trim()) {
                showAlert('searchStatus', 'Please enter a search query', 'error');
                return;
            }
            
            try {
                showAlert('searchStatus', '<span class="loading"></span> Searching...', 'info');
                const response = await fetch(`${API_BASE_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, k: 5 })
                });
                
                const data = await response.json();
                if (response.ok) {
                    displaySearchResults(data);
                } else {
                    showAlert('searchStatus', `Error: ${data.detail || 'Search failed'}`, 'error');
                }
            } catch (error) {
                showAlert('searchStatus', `Error: ${error.message}`, 'error');
            }
        }
        
        function displaySearchResults(data) {
            const resultsDiv = document.getElementById('searchResults');
            
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div class="alert info">No results found</div>';
                return;
            }
            
            let html = `<div class="alert success">Found ${data.results.length} results in ${data.retrieval_time_ms}ms</div>`;
            html += '<div class="results">';
            
            data.results.forEach((result, idx) => {
                const score = ((result.similarity || result.score || 0) * 100).toFixed(1);
                html += `
                    <div class="result-item">
                        <div class="result-header">
                            <span class="result-score">${score}% Match</span>
                        </div>
                        <div class="result-text">${escapeHtml(result.text)}</div>
                        <div class="result-meta">
                            <span>📄 ${escapeHtml(result.source || 'Unknown')}</span>
                            ${result.page_num ? `<span>📖 Page ${result.page_num}</span>` : ''}
                            ${result.chunk_index !== undefined ? `<span>Chunk #${result.chunk_index}</span>` : ''}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }
        
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/stats`);
                const data = await response.json();
                
                if (response.ok) {
                    const html = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value">${data.vectors_count || 0}</div>
                                <div class="stat-label">Vectors Indexed</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${data.vector_size || 1536}</div>
                                <div class="stat-label">Embedding Dimension</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${data.collection_name || 'documents'}</div>
                                <div class="stat-label">Collection</div>
                            </div>
                        </div>
                        <button class="btn btn-secondary" onclick="clearCollection()">Clear All Documents</button>
                    `;
                    document.getElementById('statsDisplay').innerHTML = html;
                } else {
                    showAlert('statsDisplay', 'Error loading stats', 'error');
                }
            } catch (error) {
                showAlert('statsDisplay', `Error: ${error.message}`, 'error');
            }
        }
        
        async function clearCollection() {
            if (!confirm('Are you sure? This will delete all documents.')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/clear`, { method: 'DELETE' });
                if (response.ok) {
                    fetchStats();
                    showAlert('statsDisplay', '✓ Collection cleared', 'success');
                }
            } catch (error) {
                showAlert('statsDisplay', `Error: ${error.message}`, 'error');
            }
        }
        
        function showAlert(elementId, message, type) {
            const el = document.getElementById(elementId);
            if (message) {
                el.innerHTML = `<div class="alert ${type}">${message}</div>`;
            } else {
                el.innerHTML = '';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

        </div>
    </div>
    
    <script>
        // Configuration - UPDATE THIS with your backend URL
        const API_BASE_URL = localStorage.getItem('apiUrl') || 'https://voice-pba7.onrender.com';
        
        // Initialize API status check
        window.addEventListener('load', () => {
            checkApiStatus();
            // Re-check every 30 seconds
            setInterval(checkApiStatus, 30000);
        });
        
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`, {
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    updateApiStatus(true);
                } else {
                    updateApiStatus(false);
                }
            } catch (e) {
                updateApiStatus(false);
            }
        }
        
        function updateApiStatus(connected) {
            const statusEl = document.querySelector('.api-status') || createApiStatusElement();
            if (connected) {
                statusEl.className = 'api-status connected';
                statusEl.textContent = '✓ Connected to backend';
            } else {
                statusEl.className = 'api-status disconnected';
                statusEl.textContent = '✗ Backend not available - Check API_BASE_URL';
            }
        }
        
        function createApiStatusElement() {
            const el = document.createElement('div');
            document.querySelector('header').appendChild(el);
            return el;
        }
        
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function uploadFile() {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('uploadStatus', 'Please select a file', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                showStatus('uploadStatus', 'Uploading and processing...', 'info');
                
                const response = await fetch(`${API_BASE_URL}/ingest`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showStatus('uploadStatus', 
                        `✓ Success! Ingested ${data.chunks_indexed} chunks from ${data.source}`, 
                        'success');
                    fileInput.value = '';
                } else {
                    showStatus('uploadStatus', `Error: ${data.detail || 'Upload failed'}`, 'error');
                }
            } catch (error) {
                showStatus('uploadStatus', `Error: ${error.message}`, 'error');
            }
        }
        
        async function searchDocuments() {
            const query = document.getElementById('query').value;
            
            if (!query.trim()) {
                showStatus('searchStatus', 'Please enter a search query', 'error');
                return;
            }
            
            try {
                showStatus('searchStatus', '<span class="loading"></span> Searching...', 'info');
                
                const response = await fetch(`${API_BASE_URL}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query, k: 5 })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displaySearchResults(data);
                } else {
                    showStatus('searchStatus', `Error: ${data.detail || 'Search failed'}`, 'error');
                }
            } catch (error) {
                showStatus('searchStatus', `Error: ${error.message}`, 'error');
            }
        }
        
        function displaySearchResults(data) {
            const resultsDiv = document.getElementById('searchResults');
            
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div class="status info">No results found</div>';
                return;
            }
            
            let html = `<div class="status success">Found ${data.results.length} results (${data.retrieval_time_ms}ms)</div>`;
            html += '<div class="results">';
            
            data.results.forEach((result, idx) => {
                const score = (result.similarity * 100).toFixed(1);
                html += `
                    <div class="result-item">
                        <span class="result-score">${score}% match</span>
                        <div class="result-text">${escapeHtml(result.text)}</div>
                        <div class="result-source">📄 ${escapeHtml(result.metadata?.source || 'Unknown')}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            resultsDiv.innerHTML = html;
            showStatus('searchStatus', '', '');
        }
        
        async function fetchStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/stats`);
                const data = await response.json();
                
                if (response.ok) {
                    displayStats(data);
                } else {
                    document.getElementById('statsDisplay').innerHTML = 
                        '<div class="status error">Error loading stats</div>';
                }
            } catch (error) {
                document.getElementById('statsDisplay').innerHTML = 
                    `<div class="status error">Error: ${error.message}</div>`;
            }
        }
        
        function displayStats(data) {
            const html = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value">${data.vectors_count || 0}</div>
                        <div class="stat-label">Vectors Indexed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.vector_size || 1536}</div>
                        <div class="stat-label">Embedding Dimension</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${data.collection_name || 'documents'}</div>
                        <div class="stat-label">Collection Name</div>
                    </div>
                </div>
                <button onclick="clearCollection()">Clear All Documents</button>
            `;
            document.getElementById('statsDisplay').innerHTML = html;
        }
        
        async function clearCollection() {
            if (!confirm('Are you sure? This will delete all documents.')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/clear`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    fetchStats();
                    document.getElementById('statsDisplay').innerHTML = 
                        '<div class="status success">✓ Collection cleared</div>';
                }
            } catch (error) {
                document.getElementById('statsDisplay').innerHTML = 
                    `<div class="status error">Error: ${error.message}</div>`;
            }
        }
        
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            if (message) {
                el.innerHTML = `<div class="status ${type}">${message}</div>`;
            } else {
                el.innerHTML = '';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
