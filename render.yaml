services:
  - type: web
    name: voice-rag-api
    runtime: python310
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        scope: build,runtime
        sync: false
      - key: QDRANT_HOST
        value: localhost
      - key: QDRANT_PORT
        value: 6333
      - key: QDRANT_API_KEY
        value: ""
